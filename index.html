<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단어 암기 폴더</title>
  <style>
    :root {
      --bg: #111018;
      --surface: #1b1827;
      --surface-2: #241f33;
      --text: #f6f3ff;
      --muted: #b8b0cf;
      --line: #3b3454;
      --primary: #37d8ff;
      --primary-dark: #1ea8d1;
      --accent: #ffcf3f;
      --accent-soft: #352b19;
      --warn: #f59e0b;
      --danger: #ff4f7b;
      --danger-soft: #3b1524;
      --shadow: 0 18px 0 rgba(0, 0, 0, 0.28), 0 24px 46px rgba(0, 0, 0, 0.36);
      --radius: 8px;
      --tap: 48px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(255, 207, 63, 0.08) 0%, rgba(17, 16, 24, 0) 34%),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 7px),
        linear-gradient(135deg, #15111f 0%, #0f1720 52%, #191325 100%);
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button,
    a,
    input,
    textarea,
    select {
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    a:hover {
      text-decoration: underline;
    }

    .app-shell {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 18px 14px 34px;
    }

    .topbar,
    .screen-header {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .topbar h1,
    .screen-header h1 {
      margin: 0;
      font-size: clamp(1.55rem, 7vw, 2.35rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .screen-header {
      align-items: flex-start;
    }

    .screen-title {
      display: grid;
      gap: 6px;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--accent);
      font-weight: 800;
      font-size: 0.82rem;
      text-transform: uppercase;
    }

    .subtle {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .save-badge {
      flex: 0 0 auto;
      min-width: 88px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      text-align: center;
      font-size: 0.92rem;
      font-weight: 800;
    }

    .panel {
      margin: 14px 0;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: var(--shadow);
    }

    .panel.tight {
      padding: 12px;
    }

    .section-heading {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .section-heading h2,
    .section-heading h3 {
      margin: 0;
      font-size: 1.06rem;
      letter-spacing: 0;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin: 18px 0;
    }

    .folder-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin: 16px 0;
    }

    .folder-card {
      display: grid;
      grid-template-columns: 52px 1fr;
      gap: 12px;
      align-items: center;
      width: 100%;
      min-height: 92px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: var(--shadow);
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: transform 150ms ease, border-color 150ms ease;
    }

    .folder-card:hover,
    .folder-card:focus-visible {
      border-color: var(--folder-color, var(--primary));
      transform: translateY(-1px);
      outline: none;
    }

    .folder-emoji {
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      background: var(--folder-color, var(--primary));
      color: #ffffff;
      font-size: 1.55rem;
      font-weight: 900;
    }

    .folder-card strong {
      display: block;
      font-size: 1.13rem;
    }

    .folder-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
    }

    .folder-shelf {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 18px 0;
    }

    .folder-tile {
      display: grid;
      gap: 10px;
      justify-items: center;
      width: 100%;
      padding: 10px;
      border: 0;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      text-align: center;
    }

    .folder-shape {
      position: relative;
      width: min(190px, 100%);
      aspect-ratio: 1.34;
      border: 1px solid rgba(134, 231, 255, 0.55);
      border-radius: 18px 18px 22px 22px;
      background:
        linear-gradient(180deg, rgba(112, 224, 255, 0.96) 0%, rgba(39, 189, 234, 0.96) 38%, rgba(26, 153, 217, 0.98) 100%);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.45),
        inset 0 -10px 18px rgba(8, 88, 151, 0.28),
        0 4px 0 rgba(0, 55, 108, 0.46),
        0 18px 26px rgba(0, 0, 0, 0.36);
      overflow: visible;
      transition: transform 150ms ease, filter 150ms ease, box-shadow 150ms ease;
    }

    .folder-shape::before {
      content: "";
      position: absolute;
      left: -1px;
      top: -17px;
      width: 44%;
      height: 42px;
      border: 1px solid rgba(134, 231, 255, 0.55);
      border-bottom: 0;
      border-radius: 20px 20px 0 0;
      background:
        linear-gradient(180deg, rgba(69, 203, 246, 0.98) 0%, rgba(25, 158, 219, 0.98) 100%);
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.36);
      z-index: 0;
    }

    .folder-shape::after {
      content: "";
      position: absolute;
      left: 4%;
      right: 4%;
      top: 18%;
      bottom: 8%;
      border-radius: 16px 16px 19px 19px;
      background:
        linear-gradient(180deg, rgba(116, 226, 255, 0.92) 0%, rgba(71, 204, 245, 0.94) 52%, rgba(40, 171, 229, 0.95) 100%);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.45),
        inset 0 -7px 14px rgba(13, 112, 184, 0.18);
      pointer-events: none;
      z-index: 1;
    }

    .folder-tile:hover .folder-shape,
    .folder-tile:focus-visible .folder-shape {
      filter: brightness(1.08) saturate(1.08);
      transform: translateY(-3px);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.5),
        inset 0 -10px 18px rgba(8, 88, 151, 0.28),
        0 4px 0 rgba(0, 55, 108, 0.46),
        0 22px 32px rgba(0, 0, 0, 0.42);
    }

    .folder-tile:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
    }

    .flag-bubble {
      position: absolute;
      right: 12px;
      bottom: 12px;
      display: grid;
      place-items: center;
      width: 52px;
      height: 52px;
      border: 3px solid rgba(255, 255, 255, 0.84);
      border-radius: 50%;
      background: linear-gradient(180deg, var(--folder-color, #1b96d4), #111018);
      color: #ffffff;
      box-shadow: 0 8px 14px rgba(0, 0, 0, 0.32);
      font-weight: 950;
      z-index: 2;
    }

    .folder-label {
      display: grid;
      gap: 4px;
      font-weight: 900;
    }

    .folder-label small {
      color: var(--muted);
      font-weight: 800;
    }

    .add-folder .folder-shape {
      background:
        linear-gradient(180deg, rgba(82, 98, 123, 0.92) 0%, rgba(45, 54, 78, 0.94) 100%);
      border: 1px dashed rgba(134, 231, 255, 0.45);
      filter: saturate(0.72);
    }

    .add-plus {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #37d8ff, #1ea8d1);
      color: #071017;
      font-size: 2.1rem;
      font-weight: 950;
      box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.24);
    }

    .profile-strip {
      display: grid;
      gap: 12px;
      margin: 12px 0 18px;
    }

    .profile-form {
      display: grid;
      gap: 10px;
    }

    .menu-button {
      display: grid;
      grid-template-columns: 44px 1fr;
      gap: 12px;
      align-items: center;
      min-height: 76px;
      width: 100%;
      padding: 14px;
      border: 1px solid #dce5f5;
      border-radius: var(--radius);
      color: var(--text);
      background: var(--surface);
      box-shadow: var(--shadow);
      cursor: pointer;
      text-align: left;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .menu-button:hover,
    .menu-button:focus-visible {
      border-color: var(--primary);
      box-shadow: 0 16px 38px rgba(47, 111, 237, 0.16);
      transform: translateY(-1px);
      outline: none;
    }

    .menu-number {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      color: #ffffff;
      background: var(--primary);
      font-weight: 900;
    }

    .menu-button strong {
      display: block;
      font-size: 1.12rem;
      letter-spacing: 0;
    }

    .button-row,
    .button-split {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .button-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      margin-top: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: var(--tap);
      padding: 11px 15px;
      border: 1px solid transparent;
      border-radius: 10px;
      background: var(--primary);
      color: #ffffff;
      font-weight: 800;
      line-height: 1.2;
      cursor: pointer;
      text-align: center;
      transition: transform 150ms ease, background 150ms ease, border-color 150ms ease;
    }

    .btn:hover,
    .btn:focus-visible {
      background: var(--primary-dark);
      transform: translateY(-1px);
      outline: none;
    }

    .btn.secondary {
      border-color: var(--line);
      background: #ffffff;
      color: var(--text);
    }

    .btn.secondary:hover,
    .btn.secondary:focus-visible {
      border-color: var(--primary);
      background: #f8fbff;
      color: var(--primary-dark);
    }

    .btn.accent {
      background: var(--accent);
    }

    .btn.accent:hover,
    .btn.accent:focus-visible {
      background: #0b8467;
    }

    .btn.danger {
      background: var(--danger);
    }

    .btn.danger:hover,
    .btn.danger:focus-visible {
      background: #c92828;
    }

    .btn.ghost-danger {
      border-color: #fecaca;
      background: var(--danger-soft);
      color: #b91c1c;
    }

    .btn.small {
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .btn:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      transform: none;
    }

    .file-button input {
      position: absolute;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }

    .form-grid {
      display: grid;
      gap: 12px;
    }

    .language-form {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label,
    .field-label {
      color: #374151;
      font-size: 0.92rem;
      font-weight: 800;
    }

    textarea,
    input[type="text"],
    input[type="password"],
    select {
      width: 100%;
      min-height: var(--tap);
      padding: 11px 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      color: var(--text);
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    textarea {
      min-height: 142px;
      resize: vertical;
      line-height: 1.48;
    }

    textarea:focus,
    input[type="text"]:focus,
    input[type="password"]:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(47, 111, 237, 0.12);
    }

    .message {
      min-height: 24px;
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.45;
      font-weight: 700;
    }

    .message.success {
      color: #0f766e;
    }

    .message.error {
      color: #b91c1c;
    }

    .count-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .stat-card,
    .day-chip {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .stat-card {
      padding: 13px;
    }

    .stat-label {
      display: block;
      color: var(--muted);
      font-size: 0.83rem;
      font-weight: 700;
    }

    .stat-value {
      display: block;
      margin-top: 4px;
      font-size: 1.45rem;
      font-weight: 900;
    }

    .day-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .day-chip,
    .pill {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      min-height: 34px;
      padding: 7px 10px;
      color: #1f2937;
      background: #ffffff;
      font-size: 0.9rem;
      font-weight: 800;
    }

    button.day-chip {
      cursor: pointer;
      font: inherit;
      transition: border-color 150ms ease, color 150ms ease, transform 150ms ease;
    }

    button.day-chip:hover,
    button.day-chip:focus-visible {
      border-color: var(--primary);
      color: var(--primary-dark);
      transform: translateY(-1px);
      outline: none;
    }

    .pill {
      border: 1px solid #c9f0e4;
      border-radius: 999px;
      background: var(--accent-soft);
      color: #0f766e;
    }

    .progress-wrap {
      display: grid;
      gap: 8px;
      margin: 12px 0 14px;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .progress-bar {
      overflow: hidden;
      height: 11px;
      border-radius: 999px;
      background: #e5e7eb;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      transition: width 220ms ease;
    }

    .study-card,
    .quiz-card {
      display: grid;
      gap: 14px;
      min-height: 310px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: var(--shadow);
    }

    .study-card {
      cursor: pointer;
    }

    .study-card:focus-visible {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(47, 111, 237, 0.13), var(--shadow);
      outline: none;
    }

    .word-title {
      margin: 0;
      color: var(--text);
      font-size: clamp(2.1rem, 13vw, 4.2rem);
      line-height: 1.05;
      overflow-wrap: anywhere;
      letter-spacing: 0;
    }

    .meaning-title {
      margin: 0;
      color: var(--text);
      font-size: clamp(1.8rem, 9vw, 3.3rem);
      line-height: 1.16;
      overflow-wrap: anywhere;
      letter-spacing: 0;
    }

    .pronunciation {
      margin: 0;
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 800;
    }

    .meaning-box {
      display: grid;
      gap: 5px;
      min-height: 78px;
      padding: 12px;
      border: 1px solid #dce5f5;
      border-radius: var(--radius);
      background: #f8fbff;
    }

    .meaning-box.hidden strong {
      color: #9ca3af;
      filter: blur(5px);
      user-select: none;
    }

    .meaning-box span {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 800;
    }

    .meaning-box strong {
      font-size: 1.3rem;
      overflow-wrap: anywhere;
    }

    .dictionary-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .answer-form {
      display: grid;
      gap: 10px;
    }

    .editor-list {
      display: grid;
      gap: 12px;
    }

    .editor-card {
      display: grid;
      gap: 11px;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    .editor-card-head {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }

    .editor-card-head strong {
      overflow-wrap: anywhere;
    }

    .editor-fields {
      display: grid;
      gap: 10px;
    }

    .editor-actions {
      display: flex;
      justify-content: flex-end;
    }

    .feedback {
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f9fafb;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.45;
    }

    .feedback.correct {
      border-color: #bbf7d0;
      background: #f0fdf4;
      color: #15803d;
    }

    .feedback.wrong {
      border-color: #fecaca;
      background: var(--danger-soft);
      color: #b91c1c;
    }

    .toggle-line {
      display: flex;
      gap: 10px;
      align-items: center;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      font-weight: 800;
    }

    .toggle-line input {
      width: 20px;
      height: 20px;
      accent-color: var(--primary);
    }

    .match-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .match-card {
      display: grid;
      place-items: center;
      min-height: 92px;
      padding: 10px;
      border: 2px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      box-shadow: 0 8px 22px rgba(24, 32, 51, 0.08);
      color: var(--text);
      font-weight: 900;
      line-height: 1.25;
      text-align: center;
      cursor: pointer;
      overflow-wrap: anywhere;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .match-card:hover,
    .match-card:focus-visible {
      transform: translateY(-1px);
      border-color: var(--primary);
      outline: none;
    }

    .match-card.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .match-card.wrong-flash {
      animation: wrongFlash 520ms ease;
    }

    .match-type {
      display: block;
      width: 100%;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 800;
    }

    @keyframes wrongFlash {
      0%, 100% {
        border-color: var(--line);
      }
      35%, 70% {
        border-color: var(--danger);
        background: var(--danger-soft);
      }
    }

    .pager {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 10px;
      align-items: center;
      margin-top: 14px;
    }

    .pager strong {
      white-space: nowrap;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 11px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: #374151;
      background: #f9fafb;
      font-size: 0.88rem;
      font-weight: 900;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .word-cell {
      font-weight: 900;
    }

    .empty-state {
      display: grid;
      gap: 12px;
      padding: 24px 16px;
      border: 1px dashed #cbd5e1;
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--muted);
      text-align: center;
      font-weight: 800;
    }

    .result-list {
      display: grid;
      gap: 8px;
      margin: 12px 0 0;
      padding: 0;
      list-style: none;
    }

    .result-list li {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      font-weight: 800;
    }

    .footer-link {
      display: flex;
      justify-content: center;
      margin-top: 18px;
      padding: 16px 0 0;

<body>
  <main id="app" class="app-shell"></main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEYS = {
        folders: "word_memory_language_folders_v1",
        currentFolderId: "word_memory_current_folder_v1",
        profile: "word_memory_profile_v1",
        words: "french_memory_words_v1",
        wrongNotes: "french_memory_wrong_notes_v1",
        mistakeCounts: "french_memory_mistake_counts_v1"
      };

      const DEFAULT_DICT_MAIN_URL = "https://dict.naver.com/";
      const LANGUAGE_PRESETS = [
        { name: "프랑스어", nativeName: "Francais", emoji: "FR", speechLang: "fr-FR", color: "#2f6fed", dictionaryMainUrl: "https://dict.naver.com/frkodict/#/main", dictionarySearchUrl: "https://dict.naver.com/frkodict/#/search?query=" },
        { name: "영어", nativeName: "English", emoji: "EN", speechLang: "en-US", color: "#12a37f", dictionaryMainUrl: "https://en.dict.naver.com/#/main", dictionarySearchUrl: "https://en.dict.naver.com/#/search?query=" },
        { name: "일본어", nativeName: "日本語", emoji: "JP", speechLang: "ja-JP", color: "#ef4444", dictionaryMainUrl: "https://ja.dict.naver.com/#/main", dictionarySearchUrl: "https://ja.dict.naver.com/#/search?query=" },
        { name: "중국어", nativeName: "中文", emoji: "CN", speechLang: "zh-CN", color: "#f59e0b", dictionaryMainUrl: "https://zh.dict.naver.com/#/main", dictionarySearchUrl: "https://zh.dict.naver.com/#/search?query=" },
        { name: "스페인어", nativeName: "Espanol", emoji: "ES", speechLang: "es-ES", color: "#8b5cf6", dictionaryMainUrl: "https://dict.naver.com/eskodict/#/main", dictionarySearchUrl: "https://dict.naver.com/eskodict/#/search?query=" },
        { name: "독일어", nativeName: "Deutsch", emoji: "DE", speechLang: "de-DE", color: "#facc15", dictionaryMainUrl: "https://dict.naver.com/dekodict/#/main", dictionarySearchUrl: "https://dict.naver.com/dekodict/#/search?query=" },
        { name: "기타 언어", nativeName: "Custom", emoji: "ETC", speechLang: "en-US", color: "#64748b", dictionaryMainUrl: "https://dict.naver.com/", dictionarySearchUrl: "https://dict.naver.com/search.dict?query=" }
      ];
      const app = document.getElementById("app");
      const toast = document.getElementById("toast");

      let languageFolders = [];
      let currentFolderId = "";
      let currentFolder = null;
      let userProfile = null;
      let words = [];
      let wrongNotes = {};
      let mistakeCounts = {};
      let currentView = "folderHome";
      let session = null;
      let toastTimer = null;
      let autoSpeakTimer = null;
      let speechTimerIds = [];
      let audioContext = null;

      // 앱을 시작하고 저장된 데이터를 불러옵니다.
      function initializeApp() {
        userProfile = loadFromStorage(STORAGE_KEYS.profile, null);
        languageFolders = loadLanguageFolders();
        currentFolderId = localStorage.getItem(STORAGE_KEYS.currentFolderId) || (languageFolders[0] && languageFolders[0].id) || "";
        setCurrentFolder(currentFolderId);
        saveLanguageFolders();
        document.addEventListener("click", handleClick);
        document.addEventListener("change", handleChange);
        document.addEventListener("submit", handleSubmit);
        document.addEventListener("keydown", handleKeydown);
        render();
      }

      // localStorage에서 JSON 데이터를 안전하게 읽습니다.
      function loadFromStorage(key, fallback) {
        try {
          const raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch (error) {
          console.warn("저장 데이터를 읽지 못했습니다.", error);
          return fallback;
        }
      }

      function loadLanguageFolders() {
        const storedFolders = loadFromStorage(STORAGE_KEYS.folders, null);
        if (Array.isArray(storedFolders) && storedFolders.length) {
          return storedFolders.map(normalizeFolder);
        }

        const legacyWords = loadFromStorage(STORAGE_KEYS.words, []);
        const legacyWrongNotes = loadFromStorage(STORAGE_KEYS.wrongNotes, {});
        const legacyMistakeCounts = loadFromStorage(STORAGE_KEYS.mistakeCounts, {});
        const frenchPreset = LANGUAGE_PRESETS[0];

        return [normalizeFolder({
          ...frenchPreset,
          id: "folder-french",
          words: Array.isArray(legacyWords) ? legacyWords : [],
          wrongNotes: legacyWrongNotes || {},
          mistakeCounts: legacyMistakeCounts || {},
          createdAt: new Date().toISOString()
        })];
      }

      function normalizeFolder(folder) {
        const preset = LANGUAGE_PRESETS.find((item) => item.name === folder.name) || LANGUAGE_PRESETS[0];
        return {
          id: folder.id || createFolderId(folder.name || preset.name),
          name: folder.name || preset.name,
          nativeName: folder.nativeName || preset.nativeName || "",
          emoji: folder.emoji || preset.emoji || "LANG",
          speechLang: folder.speechLang || preset.speechLang || "en-US",
          color: folder.color || preset.color || "#2f6fed",
          dictionaryMainUrl: folder.dictionaryMainUrl || preset.dictionaryMainUrl || DEFAULT_DICT_MAIN_URL,
          dictionarySearchUrl: folder.dictionarySearchUrl || preset.dictionarySearchUrl || "https://dict.naver.com/search.dict?query=",
          words: Array.isArray(folder.words) ? folder.words : [],
          wrongNotes: folder.wrongNotes || {},
          mistakeCounts: folder.mistakeCounts || {},
          createdAt: folder.createdAt || new Date().toISOString()
        };
      }

      function setCurrentFolder(folderId) {
        currentFolder = languageFolders.find((folder) => folder.id === folderId) || languageFolders[0] || null;
        currentFolderId = currentFolder ? currentFolder.id : "";
        words = currentFolder ? currentFolder.words : [];
        wrongNotes = currentFolder ? currentFolder.wrongNotes : {};
        mistakeCounts = currentFolder ? currentFolder.mistakeCounts : {};
        if (currentFolderId) localStorage.setItem(STORAGE_KEYS.currentFolderId, currentFolderId);
      }

      function saveLanguageFolders() {
        localStorage.setItem(STORAGE_KEYS.folders, JSON.stringify(languageFolders));
        if (currentFolderId) localStorage.setItem(STORAGE_KEYS.currentFolderId, currentFolderId);
      }

      function saveCurrentFolder() {
        if (!currentFolder) return;
        currentFolder.words = words;
        currentFolder.wrongNotes = wrongNotes;
        currentFolder.mistakeCounts = mistakeCounts;
        saveLanguageFolders();
      }

      function saveWords() {
        saveCurrentFolder();
      }

      function saveWrongNotes() {
        saveCurrentFolder();
      }

      function saveMistakeCounts() {
        saveCurrentFolder();
      }

      // 현재 화면 이름에 맞는 UI를 그립니다.
      function render() {
        clearTimeout(autoSpeakTimer);
        app.style.setProperty("--primary", currentView === "folderHome" || !currentFolder ? "#2f6fed" : currentFolder.color);
        if (currentView === "folderHome") renderFolderHome();
        if (currentView === "home") renderHome();
        if (currentView === "wordManager") renderWordManager();
        if (currentView === "studySetup") renderStudySetup();
        if (currentView === "studyCard") renderStudyCard();
        if (currentView === "studyComplete") renderStudyComplete();
        if (currentView === "meaningSetup") renderRangeSetup("meaning");
        if (currentView === "writingSetup") renderRangeSetup("writing");
        if (currentView === "testCard") renderTestCard();
        if (currentView === "result") renderResultSummary();
        if (currentView === "matchSetup") renderRangeSetup("match");
        if (currentView === "matchGame") renderMatchGame();
        if (currentView === "wrongNotes") renderWrongNotes();
        if (currentView === "dayEditor") renderDayEditor();
      }

      function renderFolderHome() {
        const showCreator = session && session.mode === "folderCreator";
        app.innerHTML = `
          <header class="topbar">
            <div>
              <p class="eyebrow">Vocabulary Folders</p>
              <h1>단어 암기 폴더</h1>
              <p class="subtle">배우고 싶은 언어를 폴더처럼 나누어 저장하고 학습하세요.</p>
            </div>
            <div class="save-badge">${languageFolders.length}개<br />폴더</div>
          </header>

          <section class="profile-strip panel">
            ${userProfile ? `
              <div class="section-heading">
                <h2>${escapeHtml(userProfile.username)}님의 보관함</h2>
                <button class="btn secondary small" type="button" data-action="logout-profile">로그아웃</button>
              </div>
              <p class="subtle">현재 버전은 이 브라우저에 저장됩니다. 모바일과 PC 공통 로그인 동기화는 무료 클라우드 DB 연결이 필요합니다.</p>
            ` : `
              <div class="section-heading">
                <h2>로그인</h2>
              </div>
              <div class="profile-form">
                <input id="profileUsername" type="text" placeholder="아이디" autocomplete="username" />
                <input id="profilePassword" type="password" placeholder="비밀번호" autocomplete="current-password" />
                <button class="btn accent" type="button" data-action="login-profile">계정 만들기 / 로그인</button>
              </div>
              <p class="subtle">지금은 로컬 프로필입니다. 같은 아이디로 여러 기기에서 자동 동기화하려면 Firebase나 Supabase 같은 무료 백엔드 연결이 필요합니다.</p>
            `}
          </section>

      }

      // 클릭 이벤트를 한 곳에서 처리합니다.
      function handleClick(event) {
        const actionElement = event.target.closest("[data-action]");
        if (!actionElement) return;

        const action = actionElement.dataset.action;

        if (action === "open-view") {
          session = null;
          currentView = actionElement.dataset.view;
          render();
        }

        if (action === "open-folder") openFolder(actionElement.dataset.id);
        if (action === "show-folder-creator") {
          session = { mode: "folderCreator" };
          currentView = "folderHome";
          render();
        }
        if (action === "hide-folder-creator") {
          session = null;
          currentView = "folderHome";
          render();
        }
        if (action === "login-profile") loginProfile();
        if (action === "logout-profile") logoutProfile();
        if (action === "go-folders") {
          session = null;
          currentView = "folderHome";
          render();
        }
        if (action === "create-folder") createLanguageFolder();
        if (action === "delete-folder") deleteCurrentFolder();
        if (action === "go-home") {
          session = null;
          currentView = "home";
          render();
        }

        if (action === "open-day-editor") openDayEditor(actionElement.dataset.day);
        if (action === "save-day-editor") saveDayEditor();
        if (action === "remove-editor-word") removeEditorWord(actionElement.dataset.id);
        if (action === "open-dictionary-search") openDictionarySearchFromForm();
        if (action === "add-manual-word") addManualWord();
        if (action === "paste-clipboard") pasteClipboardToImportBox();
        if (action === "import-paste") importPastedData();
        if (action === "clear-words") clearAllWords();
        if (action === "start-study") startStudy();
        if (action === "reveal-meaning") revealMeaning();
        if (action === "speak-current") speakCurrentWord();
        if (action === "learn-again") moveStudyCard(false);
        if (action === "learn-known") moveStudyCard(true);
        if (action === "move-to-meaning-test") startTestFromStudy();
        if (action === "start-range") startRangeMode(actionElement.dataset.mode);
        if (action === "select-match-card") selectMatchCard(actionElement.dataset.cardId);
        if (action === "match-prev") changeMatchPage(-1);
        if (action === "match-next") changeMatchPage(1);
        if (action === "speak-note") speakNote(actionElement.dataset.id);
        if (action === "remove-note") removeWrongNote(actionElement.dataset.id);
        if (action === "clear-wrong-notes") clearWrongNotes();
      }

      function handleChange(event) {
        if (event.target.id === "fileInput") {
          const file = event.target.files && event.target.files[0];
          if (file) importFileData(file);
          event.target.value = "";
        }

          fillLanguagePreset(Number(event.target.value));
        }
      }

      function handleSubmit(event) {
        const form = event.target.closest("[data-form]");
        if (!form) return;
        event.preventDefault();
        if (form.dataset.form === "test-answer") submitTestAnswer();
      }

      function handleKeydown(event) {
        if ((event.key === "Enter" || event.key === " ") && document.activeElement && document.activeElement.dataset.action === "reveal-meaning") {
          event.preventDefault();
          revealMeaning();
        }
      }

      function openFolder(folderId) {
        setCurrentFolder(folderId);
        session = null;
        currentView = "home";
        render();
      }

      async function loginProfile() {
        const username = getInputValue("profileUsername").trim();
        const password = getInputValue("profilePassword").trim();

        if (!username || !password) {
          showToast("아이디와 비밀번호를 입력해주세요.", "warn");
          return;
        }

        userProfile = {
          username,
          passwordHint: simpleHash(password),
          localOnly: true,
          signedInAt: new Date().toISOString()
        };
        localStorage.setItem(STORAGE_KEYS.profile, JSON.stringify(userProfile));
        render();
        showToast(`${username} 프로필로 로그인했습니다.`, "success");
      }

      function logoutProfile() {
        userProfile = null;
        localStorage.removeItem(STORAGE_KEYS.profile);
        render();
        showToast("로그아웃했습니다.", "success");
      }

      function simpleHash(value) {
        let hash = 0;
        for (let index = 0; index < value.length; index += 1) {
          hash = ((hash << 5) - hash + value.charCodeAt(index)) | 0;
        }
        return String(hash);
      }

      function fillLanguagePreset(index) {
        const preset = LANGUAGE_PRESETS[index] || LANGUAGE_PRESETS[0];
        setInputValue("languageName", preset.name);
        setInputValue("languageNativeName", preset.nativeName);
        setInputValue("languageSpeechLang", preset.speechLang);
        setInputValue("languageEmoji", preset.emoji);
        setInputValue("languageColor", preset.color);
        setInputValue("languageDictionarySearchUrl", preset.dictionarySearchUrl);
      }

      function setInputValue(id, value) {
        const input = document.getElementById(id);
        if (input) input.value = value || "";
      }

      function createLanguageFolder() {
        const presetIndex = Number(getInputValue("languagePreset") || 0);
        const preset = LANGUAGE_PRESETS[presetIndex] || LANGUAGE_PRESETS[0];
        const name = getInputValue("languageName").trim() || preset.name;
        const nativeName = getInputValue("languageNativeName").trim() || preset.nativeName;
        const speechLang = getInputValue("languageSpeechLang").trim() || preset.speechLang;
        const emoji = getInputValue("languageEmoji").trim() || preset.emoji;
        const color = getInputValue("languageColor").trim() || preset.color;
        const dictionarySearchUrl = getInputValue("languageDictionarySearchUrl").trim() || preset.dictionarySearchUrl;

        if (languageFolders.some((folder) => folder.name.trim().toLowerCase() === name.toLowerCase())) {
          showToast("이미 같은 이름의 언어 폴더가 있습니다.", "warn");
          return;
        }

        const folder = normalizeFolder({
          ...preset,
          id: createFolderId(name),
          name,
          nativeName,
          speechLang,
          emoji,
          color,
          dictionarySearchUrl,
          dictionaryMainUrl: preset.dictionaryMainUrl || DEFAULT_DICT_MAIN_URL,
          words: [],
          wrongNotes: {},
          mistakeCounts: {},
          createdAt: new Date().toISOString()
        });

        languageFolders.push(folder);
        saveLanguageFolders();
        openFolder(folder.id);
        showToast(`${folder.name} 폴더를 만들었습니다.`, "success");
      }

      function deleteCurrentFolder() {
        if (!currentFolder) return;
        if (languageFolders.length <= 1) {
          showToast("언어 폴더는 최소 1개가 필요합니다.", "warn");
          return;
        }
        if (!confirm(`${currentFolder.name} 폴더와 저장된 단어를 삭제할까요?`)) return;

        const deletedName = currentFolder.name;
        languageFolders = languageFolders.filter((folder) => folder.id !== currentFolder.id);
        setCurrentFolder(languageFolders[0].id);
        saveLanguageFolders();
        session = null;
        currentView = "folderHome";
        render();
        showToast(`${deletedName} 폴더를 삭제했습니다.`, "success");
      }

      function addManualWord() {
        const day = normalizeDay(getInputValue("manualDay") || "DAY 1");
        const word = getInputValue("manualWord").trim();
        const pronunciation = getInputValue("manualPronunciation").trim();
        const meaning = getInputValue("manualMeaning").trim();

        if (!word || !meaning) {
          showToast("단어와 뜻은 꼭 입력해주세요.", "error");
          return;
        }

        const newWord = makeWord(day, word, pronunciation, meaning);
        if (words.some((item) => item.id === newWord.id)) {
          showToast("이미 같은 단어가 저장되어 있습니다.", "warn");
          return;
        }

        words = words.concat(newWord).sort(compareWords);
        saveWords();
        render();
        showToast("단어를 추가했습니다.", "success");
      }

      function openDictionarySearchFromForm() {
        const query = getInputValue("manualWord").trim();
        if (!query) {
          showToast("검색할 단어를 먼저 입력해주세요.", "warn");
          return;
        }
        window.open(naverSearchUrl(query), "_blank", "noopener,noreferrer");
      }

      function getInputValue(id) {
        const input = document.getElementById(id);
        return input ? input.value : "";
      }

      function openDayEditor(day) {
        if (!day) return;
        session = { mode: "dayEditor", day };
        currentView = "dayEditor";
        render();
      }

      function saveDayEditor() {
        const cards = Array.from(document.querySelectorAll(".editor-card"));
        if (!cards.length) {
          showToast("저장할 단어가 없습니다.", "warn");
          return;
        }

        const editedRows = [];
        const oldIds = [];

        for (let index = 0; index < cards.length; index += 1) {
          const card = cards[index];
          const oldId = card.dataset.originalId;
          const dayInput = card.querySelector('[data-field="day"]');
          const wordInput = card.querySelector('[data-field="word"]');
          const pronunciationInput = card.querySelector('[data-field="pronunciation"]');
          const meaningInput = card.querySelector('[data-field="meaning"]');
          const day = normalizeDay(dayInput ? dayInput.value : "");
          const word = wordInput ? wordInput.value.trim() : "";
          const pronunciation = pronunciationInput ? pronunciationInput.value.trim() : "";
          const meaning = meaningInput ? meaningInput.value.trim() : "";

          if (!day || !word || !meaning) {
            showToast(`${index + 1}번째 단어의 DAY, 단어, 뜻을 모두 입력해주세요.`, "error");
            return;
          }

          oldIds.push(oldId);
          editedRows.push({ oldId, word: makeWord(day, word, pronunciation, meaning) });
        }

        const untouchedWords = words.filter((word) => !oldIds.includes(word.id));
        const nextWords = untouchedWords.concat(editedRows.map((row) => row.word));
        const seenIds = new Set();

        for (const word of nextWords) {
          if (seenIds.has(word.id)) {
            showToast("같은 DAY, 단어, 뜻을 가진 중복 단어가 있습니다.", "error");
            return;
          }
          seenIds.add(word.id);
        }

        editedRows.forEach((row) => updateLinkedWrongNote(row.oldId, row.word));
        words = nextWords.sort(compareWords);
        saveWords();
        saveWrongNotes();
        saveMistakeCounts();

        session.day = editedRows[0] ? editedRows[0].word.day : session.day;
        render();
        showToast("단어 수정 내용을 저장했습니다.", "success");
      }

      function updateLinkedWrongNote(oldId, newWord) {
        const newId = newWord.id;
        const oldCount = Number(mistakeCounts[oldId] || 0);
        const newCount = Number(mistakeCounts[newId] || 0);

        if (oldId !== newId && oldCount) {
          mistakeCounts[newId] = Math.max(oldCount, newCount);
          delete mistakeCounts[oldId];
        }

        if (wrongNotes[oldId]) {
          const previousNote = wrongNotes[oldId];
          if (oldId !== newId) delete wrongNotes[oldId];
          mistakeCounts[newId] = Math.max(
            Number(mistakeCounts[newId] || 0),
            Number(previousNote.wrongCount || 0),
            oldCount
          );
          wrongNotes[newId] = {
            ...newWord,
            wrongCount: Number(previousNote.wrongCount || mistakeCounts[newId] || mistakeCounts[oldId] || 0),
            savedAt: previousNote.savedAt || new Date().toISOString()
          };
          return;
        }

        if (wrongNotes[newId]) {
          wrongNotes[newId] = {
            ...wrongNotes[newId],
            ...newWord,
            wrongCount: Number(wrongNotes[newId].wrongCount || mistakeCounts[newId] || 0)
          };
        }
      }

      function removeEditorWord(id) {
        const word = words.find((item) => item.id === id);
        if (!word) return;
        if (!confirm(`${word.word} 단어를 삭제할까요?`)) return;

        words = words.filter((item) => item.id !== id);
        delete wrongNotes[id];
        delete mistakeCounts[id];
        saveWords();
        saveWrongNotes();
        saveMistakeCounts();

        if (session && session.mode === "dayEditor" && !words.some((item) => item.day === session.day)) {
          session = null;
          currentView = "home";
        }

        render();
        showToast("단어를 삭제했습니다.", "success");
      }

      // 붙여넣은 TSV/CSV 데이터를 단어 목록으로 변환합니다.
      async function pasteClipboardToImportBox() {
        const textarea = document.getElementById("pasteInput");
        if (!textarea) return;

        if (!navigator.clipboard || !navigator.clipboard.readText) {
          showToast("이 브라우저에서는 클립보드 읽기가 제한되어 있습니다. 입력창을 길게 눌러 직접 붙여넣어 주세요.", "warn");
          textarea.focus();
          return;
        }

        try {
          const text = await navigator.clipboard.readText();
          if (!text.trim()) {
            showToast("클립보드에 텍스트가 없습니다.", "warn");
            return;
          }
          textarea.value = normalizeSpreadsheetText(text);
          setImportMessage("클립보드 내용을 입력창에 붙여넣었습니다.", "success");
        } catch (error) {
          showToast("클립보드 권한이 막혔습니다. 입력창을 길게 눌러 직접 붙여넣어 주세요.", "warn");
          textarea.focus();
        }
      }

      async function importPastedData() {
        const textarea = document.getElementById("pasteInput");
        let text = textarea ? textarea.value : "";

        if (!text.trim() && navigator.clipboard && navigator.clipboard.readText) {
          try {
            text = await navigator.clipboard.readText();
            if (textarea) textarea.value = text;
          } catch (error) {
            // Mobile browsers may reject clipboard reads unless the user pasted manually.
          }
        }

        if (!text.trim()) {
          setImportMessage("붙여넣은 데이터가 없습니다.", "error");
          return;
        }

        try {
          const cleanText = normalizeSpreadsheetText(text);
          const delimiter = detectDelimiter(cleanText);
          const rows = normalizeImportedRows(parseDelimitedRows(cleanText, delimiter));
          const result = rowsToWords(rows);
          finishImport(result);
        } catch (error) {
          setImportMessage(`데이터를 읽지 못했습니다. ${error.message}`, "error");
        }
      }

      // 업로드한 CSV/TSV/XLSX 파일을 읽습니다.
      async function importFileData(file) {
        setImportMessage("파일을 읽는 중입니다.", "");
        try {
          const extension = file.name.split(".").pop().toLowerCase();
          let rows = [];

          if (extension === "xlsx") {
            rows = await readXlsxRows(file);
          } else if (extension === "csv" || extension === "tsv") {
            const text = await file.text();
            const delimiter = extension === "tsv" ? "\t" : detectDelimiter(text);
            rows = normalizeImportedRows(parseDelimitedRows(normalizeSpreadsheetText(text), delimiter));
          } else {
            throw new Error(".xlsx, .csv, .tsv 파일만 업로드할 수 있습니다.");
          }

          finishImport(rowsToWords(rows));
        } catch (error) {
          setImportMessage(`파일을 읽지 못했습니다. ${error.message}`, "error");
        }
      }

      function finishImport(result) {
        if (!result.words.length) {
          setImportMessage(result.errors[0] || "불러올 단어를 찾지 못했습니다.", "error");
          return;
        }

        const summary = mergeWords(result.words);
        saveWords();
        render();

        const message = [
          `${summary.added}개 추가`,
          `${summary.updated}개 갱신`,
          summary.skipped ? `${summary.skipped}개 중복 유지` : ""
        ].filter(Boolean).join(", ");

        setImportMessage(message, "success");
        if (result.errors.length) {
          showToast(`${message}. 일부 행은 형식이 맞지 않아 건너뛰었습니다.`, "warn");
        } else {
          showToast(message, "success");
        }
      }

      function setImportMessage(message, type) {
        const box = document.getElementById("importMessage");
        if (!box) {
          showToast(message, type === "error" ? "error" : "success");
          return;
        }
        box.textContent = message;
        box.className = `message ${type || ""}`;
      }

      // 단어 배열을 기존 저장 데이터와 합칩니다.
      function mergeWords(newWords) {
        const map = new Map(words.map((word) => [word.id, word]));
        let added = 0;
        let updated = 0;
        let skipped = 0;

        newWords.forEach((word) => {
          if (map.has(word.id)) {
            const before = JSON.stringify(map.get(word.id));
            map.set(word.id, word);
            if (before === JSON.stringify(word)) skipped += 1;
            else updated += 1;
          } else {
            map.set(word.id, word);
            added += 1;
          }
        });

        words = Array.from(map.values()).sort(compareWords);
        return { added, updated, skipped };
      }

      function clearAllWords() {
        if (!words.length) {
          showToast("삭제할 단어가 없습니다.", "warn");
          return;
        }
        if (!confirm("저장된 전체 단어를 삭제할까요?")) return;
        words = [];
        saveWords();
        session = null;
        currentView = "home";
        render();
        showToast("전체 단어를 삭제했습니다.", "success");
      }

      // 단어외우기 세션을 시작합니다.
      function startStudy() {
        const select = document.getElementById("studyDaySelect");
        const day = select ? select.value : "";
        const dayWords = words.filter((word) => word.day === day).sort(compareWords);

        if (!dayWords.length) {
          showToast("선택한 DAY에 단어가 없습니다.", "warn");
          return;
        }

        session = {
          mode: "study",
          day,
          originalWords: dayWords,
          originalTotal: dayWords.length,
          queue: shuffle(dayWords),
          retryQueue: [],
          completedIds: new Set(),
          index: 0,
          round: 1,
          lastAutoSpeakKey: ""
        };
        currentView = "studyCard";
        render();
      }

      function revealMeaning() {
        const box = document.getElementById("meaningBox");
        if (box) box.classList.remove("hidden");
      }

      function moveStudyCard(isKnown) {
        if (!session || session.mode !== "study") return;
        const word = session.queue[session.index];

        if (isKnown) {
          session.completedIds.add(word.id);
        } else if (!session.retryQueue.some((item) => item.id === word.id)) {
          session.retryQueue.push(word);
        }

        session.index += 1;

        if (session.index >= session.queue.length) {
          if (session.retryQueue.length) {
            session.queue = shuffle(session.retryQueue);
            session.retryQueue = [];
            session.index = 0;
            session.round += 1;
            session.lastAutoSpeakKey = "";
            showToast("다시 암기할 단어만 반복합니다.", "warn");
            render();
            return;
          }
          currentView = "studyComplete";
          render();
          return;
        }

        render();
      }

      function startTestFromStudy() {
        if (!session || !session.day) return;
        startTest("meaning", session.day, session.day, false);
      }

      function startRangeMode(mode) {
        const startSelect = document.getElementById(`${mode}StartDay`);
        const endSelect = document.getElementById(`${mode}EndDay`);
        const startDay = startSelect ? startSelect.value : "";
        const endDay = endSelect ? endSelect.value : "";

        if (mode === "match") {
          startMatchGame(startDay, endDay);
          return;
        }

        const accentIgnore = Boolean(document.getElementById("accentIgnore") && document.getElementById("accentIgnore").checked);
        startTest(mode, startDay, endDay, accentIgnore);
      }

      // 단어암기 또는 단어쓰기 시험을 시작합니다.
      function startTest(mode, startDay, endDay, accentIgnore) {
        const selectedWords = getWordsInDayRange(startDay, endDay);
        if (!selectedWords.length) {
          showToast("선택한 범위에 단어가 없습니다.", "warn");
          return;
        }

        session = {
          mode,
          startDay,
          endDay,
          accentIgnore,
          originalWords: selectedWords,
          originalTotal: selectedWords.length,
          queue: shuffle(selectedWords),
          retryQueue: [],
          index: 0,
          round: 1,
          locked: false,
          feedback: null,
          firstWrongIds: new Set(),
          correctFirstIds: new Set(),
          addedWrongNoteIds: new Set(),
          lastAutoSpeakKey: ""
        };
        currentView = "testCard";
        render();
      }

      function submitTestAnswer() {
        if (!session || session.locked) return;

        const input = document.getElementById("answerInput");
        const answer = input ? input.value : "";
        if (!answer.trim()) {
          showToast("답을 입력해주세요.", "warn");
          return;
        }

        const word = session.queue[session.index];
        const isCorrect = session.mode === "meaning"
          ? isMeaningAnswerCorrect(answer, word.meaning)
          : isWritingAnswerCorrect(answer, word.word, session.accentIgnore);

        session.locked = true;

        if (isCorrect) {
          if (!session.firstWrongIds.has(word.id)) session.correctFirstIds.add(word.id);
          session.feedback = { type: "correct", text: "정답입니다." };
          render();
          window.setTimeout(() => advanceTestCard(), 520);
          return;
        }

        session.firstWrongIds.add(word.id);
        if (!session.retryQueue.some((item) => item.id === word.id)) session.retryQueue.push(word);
        const added = recordMistake(word);
        if (added) session.addedWrongNoteIds.add(word.id);

        const answerText = session.mode === "meaning" ? word.meaning : word.word;
        session.feedback = { type: "wrong", text: `오답입니다. 정답: ${answerText}` };
        render();
        window.setTimeout(() => advanceTestCard(), 900);
      }

      function advanceTestCard() {
        if (!session) return;
        session.index += 1;
        session.locked = false;
        session.feedback = null;

        if (session.index >= session.queue.length) {
          if (session.retryQueue.length) {
            session.queue = shuffle(session.retryQueue);
            session.retryQueue = [];
            session.index = 0;
            session.round += 1;
            session.lastAutoSpeakKey = "";
            showToast("틀린 문제만 다시 출제합니다.", "warn");
            render();
            return;
          }

          currentView = "result";
          render();
          return;
        }

        render();
      }

      // 카드맞추기 세션을 시작합니다.
      function startMatchGame(startDay, endDay) {
        const selectedWords = shuffle(getWordsInDayRange(startDay, endDay));
        if (!selectedWords.length) {
          showToast("선택한 범위에 단어가 없습니다.", "warn");
          return;
        }

        const wordPages = chunk(selectedWords, 6);
        const pages = wordPages.map((pageWords, pageIndex) => {
          const cards = pageWords.flatMap((word) => [
            {
              cardId: `${pageIndex}-${word.id}-word`,
              pairId: word.id,
              wordId: word.id,
              type: "word",
              text: word.word
            },
            {
              cardId: `${pageIndex}-${word.id}-meaning`,
              pairId: word.id,
              wordId: word.id,
              type: "meaning",
              text: word.meaning
            }
          ]);

          return {
            words: pageWords,
            cards: shuffle(cards),
            selectedIds: [],
            matchedIds: [],
            flashIds: []
          };
        });

        session = {
          mode: "match",
          startDay,
          endDay,
          pages,
          pageIndex: 0
        };
        currentView = "matchGame";
        render();
      }

      function selectMatchCard(cardId) {
        if (!session || session.mode !== "match") return;
        const page = session.pages[session.pageIndex];
        const card = page.cards.find((item) => item.cardId === cardId);
        if (!card || page.matchedIds.includes(cardId)) return;

        if (card.type === "word") {
          const word = findWordById(card.wordId);
          if (word) speakFrench(word.word, 1);
        }

        if (page.selectedIds.includes(cardId)) {
          page.selectedIds = page.selectedIds.filter((id) => id !== cardId);
          render();
          return;
        }

        if (page.selectedIds.length === 0) {
          page.selectedIds = [cardId];
          render();
          return;
        }

        const firstCard = page.cards.find((item) => item.cardId === page.selectedIds[0]);
        if (!firstCard) {
          page.selectedIds = [cardId];
          render();
          return;
        }

        if (firstCard.type === card.type) {
          page.selectedIds = [cardId];
          render();
          return;
        }

        if (firstCard.pairId === card.pairId) {
          page.matchedIds.push(firstCard.cardId, card.cardId);
          page.selectedIds = [];
          showToast("맞았습니다.", "success");
          render();
          return;
        }

        page.flashIds = [firstCard.cardId, card.cardId];
        page.selectedIds = [];
        render();
        window.setTimeout(() => {
          if (!session || session.mode !== "match") return;
          page.flashIds = [];
          render();
        }, 540);
      }

      function changeMatchPage(direction) {
        if (!session || session.mode !== "match") return;
        const nextIndex = session.pageIndex + direction;
        if (nextIndex < 0 || nextIndex >= session.pages.length) return;
        session.pageIndex = nextIndex;
        render();
      }

      // 오답 횟수를 기록하고 2회 이상이면 오답노트에 저장합니다.
      function recordMistake(word) {
        mistakeCounts[word.id] = Number(mistakeCounts[word.id] || 0) + 1;
        saveMistakeCounts();

        if (mistakeCounts[word.id] < 2) return false;

        const wasNew = !wrongNotes[word.id];
        wrongNotes[word.id] = {
          ...word,
          wrongCount: mistakeCounts[word.id],
          savedAt: new Date().toISOString()
        };
        saveWrongNotes();
        return wasNew;
      }

      function speakCurrentWord() {
        if (!session) return;
        let word = null;
        if (session.mode === "study") word = session.queue[session.index];
        if (session.mode === "meaning" || session.mode === "writing") word = session.queue[session.index];
        if (word) speakFrench(word.word, 2);
      }

      function speakNote(id) {
        const note = wrongNotes[id];
        if (note) speakFrench(note.word, 2);
      }

      function removeWrongNote(id) {
        if (!wrongNotes[id]) return;
        delete wrongNotes[id];
        mistakeCounts[id] = 0;
        saveWrongNotes();
        saveMistakeCounts();
        render();
        showToast("오답노트에서 제거했습니다.", "success");
      }

      function clearWrongNotes() {
        if (!Object.keys(wrongNotes).length) {
          showToast("초기화할 오답노트가 없습니다.", "warn");
          return;
        }
        if (!confirm("오답노트를 초기화할까요?")) return;
        wrongNotes = {};
        mistakeCounts = {};
        saveWrongNotes();
        saveMistakeCounts();
        render();
        showToast("오답노트를 초기화했습니다.", "success");
      }

      // 브라우저 speechSynthesis로 프랑스어 단어를 읽습니다.
      function speakFrench(text, times = 1) {
        if (!("speechSynthesis" in window)) {
          showToast("이 브라우저는 음성 합성을 지원하지 않습니다.", "warn");
          return;
        }

        const cleanText = String(text || "").trim();
        if (!cleanText) return;

        clearSpeechTimers();
        window.speechSynthesis.cancel();
        if (typeof window.speechSynthesis.resume === "function") {
          window.speechSynthesis.resume();
        }

        wakeAudioOutput(() => speakFrenchSequence(cleanText, Math.max(1, times)));
      }

      async function wakeAudioOutput(callback) {
        try {
          const AudioContextClass = window.AudioContext || window.webkitAudioContext;
          if (!AudioContextClass) {
            queueSpeechTimer(callback, 420);
            return;
          }

          if (!audioContext) audioContext = new AudioContextClass();
          if (audioContext.state === "suspended") await audioContext.resume();

          const oscillator = audioContext.createOscillator();
          const gain = audioContext.createGain();
          const now = audioContext.currentTime;
          oscillator.type = "sine";
          oscillator.frequency.setValueAtTime(120, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.linearRampToValueAtTime(0.012, now + 0.02);
          gain.gain.linearRampToValueAtTime(0.0001, now + 0.16);
          oscillator.connect(gain);
          gain.connect(audioContext.destination);
          oscillator.start(now);
          oscillator.stop(now + 0.18);
          queueSpeechTimer(callback, 520);
        } catch (error) {
          queueSpeechTimer(callback, 520);
        }
      }

      function speakFrenchSequence(text, times) {
        const voices = window.speechSynthesis.getVoices();
        const frenchVoice = voices.find((voice) => voice.lang && voice.lang.toLowerCase().startsWith("fr"));
        let spokenCount = 0;

        const speakNext = () => {
          if (spokenCount >= times) return;

          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = getCurrentSpeechLang();
          utterance.rate = 0.78;
          utterance.pitch = 1;
          if (frenchVoice) utterance.voice = frenchVoice;

          utterance.onend = () => {
            spokenCount += 1;
            if (spokenCount < times) queueSpeechTimer(speakNext, 520);
          };

          utterance.onerror = () => {
            spokenCount += 1;
            if (spokenCount < times) queueSpeechTimer(speakNext, 520);
          };

          window.speechSynthesis.speak(utterance);
        };

        speakNext();
      }

      function queueSpeechTimer(callback, delay) {
        const timerId = window.setTimeout(() => {
          speechTimerIds = speechTimerIds.filter((id) => id !== timerId);
          callback();
        }, delay);
        speechTimerIds.push(timerId);
      }

      function clearSpeechTimers() {
        speechTimerIds.forEach((timerId) => window.clearTimeout(timerId));
        speechTimerIds = [];
      }

      function scheduleSpeak(text, times) {
        clearTimeout(autoSpeakTimer);
        autoSpeakTimer = window.setTimeout(() => speakFrench(text, times), 430);
      }

      // 한국어 뜻 입력 답안을 채점합니다.
      function isMeaningAnswerCorrect(input, meaning) {
        const answer = normalizeMeaning(input);
        if (!answer) return false;

        const fullMeaning = normalizeMeaning(meaning);
        const candidates = String(meaning)
          .split(/[,，、;；/]/)
          .map(normalizeMeaning)
          .filter(Boolean);

        return candidates.some((item) => item === answer || item.includes(answer)) || fullMeaning.includes(answer);
      }

      // 프랑스어 단어 쓰기 답안을 채점합니다.
      function isWritingAnswerCorrect(input, correctWord, accentIgnore) {
        const answer = normalizeFrenchWord(input, accentIgnore);
        const expected = normalizeFrenchWord(correctWord, accentIgnore);
        return Boolean(answer) && answer === expected;
      }

      function normalizeMeaning(value) {
        return String(value || "").trim().toLowerCase().replace(/\s+/g, " ");
      }

      function normalizeFrenchWord(value, accentIgnore) {
        let text = String(value || "").trim().toLowerCase().replace(/\s+/g, " ");
        if (accentIgnore) {
          text = text.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }
        return text;
      }

      // CSV, TSV 중 어떤 구분자인지 추정합니다.
      function detectDelimiter(text) {
        const firstLine = String(text).split(/\r?\n/).find((line) => line.trim()) || "";
        if (firstLine.includes("\t")) return "\t";
        const commaCount = (firstLine.match(/,/g) || []).length;
        const semicolonCount = (firstLine.match(/;/g) || []).length;
        return semicolonCount > commaCount ? ";" : ",";
      }

      function normalizeSpreadsheetText(text) {
        return String(text || "")
          .replace(/\u00a0/g, " ")
          .replace(/\r\n/g, "\n")
          .replace(/\r/g, "\n")
          .trim();
      }

      function normalizeImportedRows(rows) {
        return rows.map((row) => {
          if (row.length >= 4) return row;
          const singleCell = String(row[0] || "").trim();
          if (!singleCell) return row;
          if (singleCell.includes("\t")) return singleCell.split("\t");
          if ((singleCell.match(/,/g) || []).length >= 3) return parseDelimitedRows(singleCell, ",")[0] || row;
          if ((singleCell.match(/;/g) || []).length >= 3) return parseDelimitedRows(singleCell, ";")[0] || row;
          const spaced = singleCell.split(/\s{2,}/);
          return spaced.length >= 4 ? spaced : row;
        });
      }

      // 따옴표가 있는 CSV도 읽을 수 있는 간단한 구분자 파서입니다.
      function parseDelimitedRows(text, delimiter) {
        const rows = [];
        let row = [];
        let cell = "";
        let inQuotes = false;

        for (let index = 0; index < text.length; index += 1) {
          const char = text[index];
          const next = text[index + 1];

          if (char === '"') {
            if (inQuotes && next === '"') {
              cell += '"';
              index += 1;
            } else {
              inQuotes = !inQuotes;
            }
            continue;
          }

          if (char === delimiter && !inQuotes) {
            row.push(cell);
            cell = "";
            continue;
          }

          if ((char === "\n" || char === "\r") && !inQuotes) {
            if (char === "\r" && next === "\n") index += 1;
            row.push(cell);
            if (row.some((item) => String(item).trim())) rows.push(row);
            row = [];
            cell = "";
            continue;
          }

          cell += char;
        }

        row.push(cell);
        if (row.some((item) => String(item).trim())) rows.push(row);
        return rows;
      }

      // 엑셀 행 데이터를 앱의 단어 객체로 변환합니다.
      function rowsToWords(rows) {
        const parsedWords = [];
        const errors = [];

        rows.forEach((rawRow, index) => {
          const row = rawRow.map((cell) => String(cell ?? "").trim());
          if (!row.some(Boolean)) return;
          if (index === 0 && looksLikeHeader(row)) return;

          if (row.length < 4) {
            errors.push(`${index + 1}행: DAY / 단어 / 발음 / 뜻 순서로 4개 값이 필요합니다.`);
            return;
          }

          const day = normalizeDay(row[0]);
          const word = row[1];
          const pronunciation = row[2];
          const meaning = row.slice(3).join(", ").trim();

          if (!day || !word || !meaning) {
            errors.push(`${index + 1}행: DAY, 단어, 뜻은 비워둘 수 없습니다.`);
            return;
          }

          parsedWords.push(makeWord(day, word, pronunciation, meaning));
        });

        return { words: parsedWords, errors };
      }

      function looksLikeHeader(row) {
        const first = String(row[0] || "").toLowerCase();
        const second = String(row[1] || "");
        return first === "day" && (second.includes("단어") || second.toLowerCase().includes("word"));
      }

      function normalizeDay(value) {
        const text = String(value || "").trim();
        const dayMatch = text.match(/day\s*0*([0-9]+)/i);
        const numberMatch = text.match(/^0*([0-9]+)$/);
        if (dayMatch) return `DAY ${Number(dayMatch[1])}`;
        if (numberMatch) return `DAY ${Number(numberMatch[1])}`;
        if (/^day\b/i.test(text)) return text.replace(/^day/i, "DAY").replace(/\s+/g, " ");
        return text;
      }

      function makeWord(day, word, pronunciation, meaning) {
        const cleanWord = String(word || "").trim();
        const cleanMeaning = String(meaning || "").trim();
        return {
          id: createWordId(day, cleanWord, cleanMeaning),
          day,
          word: cleanWord,
          pronunciation: String(pronunciation || "").trim(),
          meaning: cleanMeaning
        };
      }

      function createWordId(day, word, meaning) {
        return [day, word.toLowerCase(), meaning.toLowerCase()].join("|");
      }

      function createFolderId(name) {
        const safeName = String(name || "language")
          .trim()
          .toLowerCase()
          .replace(/[^a-z0-9가-힣]+/g, "-")
          .replace(/^-+|-+$/g, "") || "language";
        return `folder-${safeName}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2, 7)}`;
      }

      // xlsx 파일에서 첫 번째 워크시트의 행 데이터를 읽습니다.
      async function readXlsxRows(file) {
        const buffer = await file.arrayBuffer();
        const entries = await unzipXlsx(buffer);
        const sharedStrings = parseSharedStrings(getZipText(entries, "xl/sharedStrings.xml") || "");
        const sheetPath = findFirstSheetPath(entries);
        if (!sheetPath) throw new Error("첫 번째 워크시트를 찾지 못했습니다.");
        const sheetXml = getZipText(entries, sheetPath);
        return parseSheetRows(sheetXml, sharedStrings);
      }

      // xlsx는 zip 파일이므로 필요한 XML 파일을 꺼냅니다.
      async function unzipXlsx(arrayBuffer) {
        const bytes = new Uint8Array(arrayBuffer);
        const view = new DataView(arrayBuffer);
        const endOffset = findEndOfCentralDirectory(view);
        if (endOffset < 0) throw new Error("xlsx 압축 구조를 읽지 못했습니다.");

        const entryCount = view.getUint16(endOffset + 10, true);
        let centralOffset = view.getUint32(endOffset + 16, true);
        const entries = {};
        const decoder = new TextDecoder("utf-8");

        for (let index = 0; index < entryCount; index += 1) {
          if (view.getUint32(centralOffset, true) !== 0x02014b50) {
            throw new Error("xlsx 중앙 디렉터리가 올바르지 않습니다.");
          }

          const method = view.getUint16(centralOffset + 10, true);
          const compressedSize = view.getUint32(centralOffset + 20, true);
          const fileNameLength = view.getUint16(centralOffset + 28, true);
          const extraLength = view.getUint16(centralOffset + 30, true);
          const commentLength = view.getUint16(centralOffset + 32, true);
          const localOffset = view.getUint32(centralOffset + 42, true);
          const nameBytes = bytes.subarray(centralOffset + 46, centralOffset + 46 + fileNameLength);
          const name = decoder.decode(nameBytes).replace(/^\/+/, "");

          if (view.getUint32(localOffset, true) !== 0x04034b50) {
            throw new Error("xlsx 로컬 파일 헤더가 올바르지 않습니다.");
          }

          const localNameLength = view.getUint16(localOffset + 26, true);
          const localExtraLength = view.getUint16(localOffset + 28, true);
          const dataStart = localOffset + 30 + localNameLength + localExtraLength;
          const compressed = bytes.subarray(dataStart, dataStart + compressedSize);

          entries[name] = method === 0 ? compressed : await inflateZipEntry(compressed, method);
          centralOffset += 46 + fileNameLength + extraLength + commentLength;
        }

        return entries;
      }

      function findEndOfCentralDirectory(view) {
        const minOffset = Math.max(0, view.byteLength - 66000);
        for (let offset = view.byteLength - 22; offset >= minOffset; offset -= 1) {
          if (view.getUint32(offset, true) === 0x06054b50) return offset;
        }
        return -1;
      }

      async function inflateZipEntry(data, method) {
        if (method !== 8) throw new Error("지원하지 않는 xlsx 압축 방식입니다.");
        if (!("DecompressionStream" in window)) {
          throw new Error("이 브라우저는 xlsx 압축 해제를 지원하지 않습니다. CSV 또는 TSV로 저장해 업로드해주세요.");
        }

        try {
          const stream = new Blob([data]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
          return new Uint8Array(await new Response(stream).arrayBuffer());
        } catch (error) {
          const stream = new Blob([data]).stream().pipeThrough(new DecompressionStream("deflate"));
          return new Uint8Array(await new Response(stream).arrayBuffer());
        }
      }

      function getZipText(entries, path) {
        const data = entries[path];
        return data ? new TextDecoder("utf-8").decode(data) : "";
      }

      function parseSharedStrings(xmlText) {
        if (!xmlText) return [];
        const doc = new DOMParser().parseFromString(xmlText, "application/xml");
        return Array.from(doc.getElementsByTagName("si")).map((item) =>
          Array.from(item.getElementsByTagName("t")).map((node) => node.textContent || "").join("")
        );
      }

      function findFirstSheetPath(entries) {
        const workbookXml = getZipText(entries, "xl/workbook.xml");
        const relsXml = getZipText(entries, "xl/_rels/workbook.xml.rels");

        if (workbookXml && relsXml) {
          const workbook = new DOMParser().parseFromString(workbookXml, "application/xml");
          const rels = new DOMParser().parseFromString(relsXml, "application/xml");
          const firstSheet = workbook.getElementsByTagName("sheet")[0];
          const relationId = firstSheet && (firstSheet.getAttribute("r:id") || firstSheet.getAttributeNS("http://schemas.openxmlformats.org/officeDocument/2006/relationships", "id"));
          const relationship = Array.from(rels.getElementsByTagName("Relationship")).find((item) => item.getAttribute("Id") === relationId);

          if (relationship) {
            const target = relationship.getAttribute("Target") || "";
            const clean = target.replace(/^\/+/, "");
            return clean.startsWith("xl/") ? clean : `xl/${clean}`;
          }
        }

        return Object.keys(entries).find((name) => /^xl\/worksheets\/sheet[0-9]+\.xml$/i.test(name)) || "";
      }

      function parseSheetRows(sheetXml, sharedStrings) {
        const doc = new DOMParser().parseFromString(sheetXml, "application/xml");
        const rowElements = Array.from(doc.getElementsByTagName("row"));

        return rowElements.map((rowElement) => {
          const row = [];
          const cells = Array.from(rowElement.getElementsByTagName("c"));

          cells.forEach((cell, cellIndex) => {
            const ref = cell.getAttribute("r") || "";
            const columnLetters = ref.replace(/[0-9]/g, "");
            const columnIndex = columnLetters ? columnNameToIndex(columnLetters) : cellIndex;
            row[columnIndex] = readCellValue(cell, sharedStrings);
          });

          return row;
        });
      }

      function readCellValue(cell, sharedStrings) {
        const type = cell.getAttribute("t");

        if (type === "inlineStr") {
          return Array.from(cell.getElementsByTagName("t")).map((node) => node.textContent || "").join("");
        }

        const valueNode = cell.getElementsByTagName("v")[0];
        const raw = valueNode ? valueNode.textContent || "" : "";
        if (type === "s") return sharedStrings[Number(raw)] || "";
        return raw;
      }

      function columnNameToIndex(name) {
        let number = 0;
        for (let index = 0; index < name.length; index += 1) {
          number = number * 26 + (name.charCodeAt(index) - 64);
        }
        return number - 1;
      }

      function getUniqueDays() {
        return Array.from(new Set(words.map((word) => word.day))).sort(compareDays);
      }

      function getDayCounts() {
        return getUniqueDays().map((day) => ({
          day,
          count: words.filter((word) => word.day === day).length
        }));
      }

      function getLastDay() {
        const days = getUniqueDays();
        return days[days.length - 1] || "";
      }

      function renderDayOptions(selectedDay = "") {
        const days = getUniqueDays();
        const selected = selectedDay || days[0] || "";
        return days.map((day) => `<option value="${escapeAttr(day)}" ${day === selected ? "selected" : ""}>${escapeHtml(day)}</option>`).join("");
      }

      function getWordsInDayRange(startDay, endDay) {
        const days = getUniqueDays();
        let startIndex = days.indexOf(startDay);
        let endIndex = days.indexOf(endDay);
        if (startIndex < 0) startIndex = 0;
        if (endIndex < 0) endIndex = days.length - 1;
        if (startIndex > endIndex) [startIndex, endIndex] = [endIndex, startIndex];
        const selectedDays = new Set(days.slice(startIndex, endIndex + 1));
        return words.filter((word) => selectedDays.has(word.day)).sort(compareWords);
      }

      function compareWords(a, b) {
        return compareDays(a.day, b.day) || a.word.localeCompare(b.word, "fr") || a.meaning.localeCompare(b.meaning, "ko");
      }

      function compareDays(a, b) {
        const aNumber = dayNumber(a);
        const bNumber = dayNumber(b);
        if (aNumber !== bNumber) return aNumber - bNumber;
        return String(a).localeCompare(String(b), "ko");
      }

      function dayNumber(day) {
        const match = String(day).match(/[0-9]+/);
        return match ? Number(match[0]) : Number.MAX_SAFE_INTEGER;
      }

      function findWordById(id) {
        return words.find((word) => word.id === id) || wrongNotes[id] || null;
      }

      function naverSearchUrl(word) {
        const folder = currentFolder || LANGUAGE_PRESETS[0];
        const baseUrl = folder.dictionarySearchUrl || "https://dict.naver.com/search.dict?query=";
        const encodedWord = encodeURIComponent(word);
        if (baseUrl.includes("{query}")) return baseUrl.replace("{query}", encodedWord);
        if (/[?&=]$/.test(baseUrl)) return `${baseUrl}${encodedWord}`;
        return `${baseUrl}${baseUrl.includes("?") ? "&query=" : "?query="}${encodedWord}`;
      }

      function dictionaryMainUrl(folder) {
        if (folder.dictionaryMainUrl) return folder.dictionaryMainUrl;
        if (folder.dictionarySearchUrl) return folder.dictionarySearchUrl.replace(/(#\/search\?query=|search\.dict\?query=).*$/i, "#/main");
        return DEFAULT_DICT_MAIN_URL;
      }

      function getCurrentSpeechLang() {
        return (currentFolder && currentFolder.speechLang) || "fr-FR";
      }

      function focusAnswerInput() {
        if (window.innerWidth < 720) return;
        window.setTimeout(() => {
          const input = document.getElementById("answerInput");
          if (input && !input.disabled) input.focus();
        }, 0);
      }

      function shuffle(array) {
        const copy = array.slice();
        for (let index = copy.length - 1; index > 0; index -= 1) {
          const randomIndex = Math.floor(Math.random() * (index + 1));
          [copy[index], copy[randomIndex]] = [copy[randomIndex], copy[index]];
        }
        return copy;
      }

      function chunk(array, size) {
        const chunks = [];
        for (let index = 0; index < array.length; index += size) {
          chunks.push(array.slice(index, index + size));
        }
        return chunks;
      }

      function showToast(message, type = "") {
        clearTimeout(toastTimer);
        toast.textContent = message;
        toast.className = `toast show ${type}`;
        toastTimer = window.setTimeout(() => {
          toast.className = "toast";
        }, 2600);
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[char]));
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, "&#96;");
      }

      initializeApp();
    })();
  </script>
</body>
</html>
